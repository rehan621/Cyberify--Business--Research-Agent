version: "3.8"

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: cyberify_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cyberify_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyberify_network

  # ── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cyberify_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cyberify_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/backend/rag/chroma_db
    networks:
      - cyberify_network
    restart: unless-stopped

  # ── Streamlit Frontend ───────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cyberify_frontend
    environment:
      API_BASE: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - cyberify_network
    restart: unless-stopped

# ── Volumes ──────────────────────────────────────────────────
volumes:
  postgres_data:
  uploads_data:
  chroma_data:

# ── Network ──────────────────────────────────────────────────
networks:
  cyberify_network:
    driver: bridge
